title: TealTiger Blog
description: Engineering, governance, and security for agentic AI

# Public URL (helps SEO + RSS)
url: https://blogs.tealtiger.ai
baseurl: ""

timezone: Asia/Kolkata

# Docs base for cross-links inside posts
docs_base: https://docs.tealtiger.ai

theme: minima
markdown: kramdown
permalink: /:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

nav:
  - title: Docs
    url: https://docs.tealtiger.ai
  - title: GitHub
    url: https://github.com/nagasatish007
  - title: RSS
    url: /feed.xml

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: TealTiger
