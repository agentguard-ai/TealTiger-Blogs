title: TealTiger Blog
description: Engineering, governance, and security for agentic AI

# Public URL (important for SEO + RSS)
url: https://blogs.tealtiger.ai
baseurl: ""

timezone: Asia/Kolkata

# Docs base for cross-links inside posts (blog ↔ docs)
docs_base: https://docs.tealtiger.ai

# Remove minima to ensure your custom layouts/styles are used
# theme: minima

markdown: kramdown
permalink: /:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

nav:
  - title: Docs
    url: https://docs.tealtiger.ai
  - title: Governance
    url: /governance/
  - title: GitHub
    url: https://github.com/agentguard-ai/tealtiger
  - title: PyPI
    url: https://pypi.org/project/tealtiger/
  - title: npm
    url: https://www.npmjs.com/package/tealtiger
  - title: Tags
    url: /tags/
  - title: RSS
    url: /feed.xml

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: TealTiger
