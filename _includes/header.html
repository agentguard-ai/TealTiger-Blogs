<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img class="brand-logo" src="{{ '/assets/images/tealtiger-logo-64.png' | relative_url }}" alt="TealTiger logo" width="32" height="32">
      <span class="brand-mark">TealTiger</span>
      <span class="brand-sub">Blog</span>
    </a>

    <nav class="nav">
      {% for item in site.nav %}
        <a class="nav-link" href="{{ item.url | relative_url }}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
